    <style>
      #preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 999999;
        transition:
          opacity 0.6s ease-in-out,
          visibility 0.6s ease-in-out;
      }
      #preloader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .loader {
        width: 50px;
        height: 50px;
        border: 4px solid #eaf2fb;
        border-top: 4px solid #fcaf17;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>

    <title>Darshan Transport | Fast & Reliable Logistics in Nepal</title>
